<section class="bg-[#f4ede6] py-12 mb-10">
  <div class="container mx-auto px-6">
    <div class="flex items-center gap-4">
      <div class="p-4 bg-white rounded-2xl shadow-sm text-[#9c8372]">
        <i class="fa-solid fa-box-open text-3xl"></i>
      </div>
      <div>
        <h1 class="text-4xl font-extrabold text-[#2d2824]">All Products</h1>
        <p class="text-[#8c8278]">Explore our complete product collection</p>
      </div>
    </div>
  </div>
</section>

<div class="container mx-auto px-6 mb-16">
  <p class="text-[#8c8278] font-medium mb-6">Showing page {{ currentPage() }} of {{ numberOfPages() }}</p>

  <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 mb-10">
    @for (product of productsList(); track product.id) {
    <div class="h-full">
      <app-product-cart [product]="product"></app-product-cart>
    </div>
    }
  </div>

  <!-- Pagination Buttons -->
  <div class="flex justify-center items-center gap-3 mt-12">
    <button
      (click)="changePage(currentPage() - 1)"
      [disabled]="currentPage() === 1"
      class="w-10 h-10 rounded-full border border-[#e3dcd3] flex items-center justify-center hover:bg-[#9c8372] hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed">
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <div class="flex gap-2">
      @for (item of [].constructor(numberOfPages()); track $index) {
        <button
          (click)="changePage($index + 1)"
          [class.bg-[#9c8372]]="currentPage() === ($index + 1)"
          [class.text-white]="currentPage() === ($index + 1)"
          class="w-10 h-10 rounded-full border border-[#e3dcd3] font-bold transition-all hover:border-[#9c8372]">
          {{ $index + 1 }}
        </button>
      }
    </div>

    <button
      (click)="changePage(currentPage() + 1)"
      [disabled]="currentPage() === numberOfPages()"
      class="w-10 h-10 rounded-full border border-[#e3dcd3] flex items-center justify-center hover:bg-[#9c8372] hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed">
      <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>
</div>
