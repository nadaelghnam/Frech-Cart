<section class="my-8 bg-[#fdfbf7]">
  <div class="container mx-auto">
    <div class="flex items-center gap-3 mb-10">
      <div class="w-1.5 h-8 bg-[#9c8372] rounded-full"></div>
      <h2 class="text-2xl md:text-3xl font-bold text-[#2d2824]">
        Featured <span class="text-[#9c8372]">Products</span>
      </h2>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 mb-5">
      @for (product of productsList(); track $index) {
      <div class="h-full">
        <app-product-cart [product]="product" ></app-product-cart>
      </div>
      }
    </div>
  </div>
</section>
