<div class="min-h-screen bg-[#fdfbf7] flex items-center justify-center p-4 md:p-10 font-sans relative overflow-hidden">

  <div class="absolute top-[-10%] right-[-5%] w-[500px] h-[500px] bg-[#9c8372]/5 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] left-[-5%] w-[600px] h-[600px] bg-[#e0c099]/10 rounded-full blur-[150px]"></div>

  <div class="max-w-[1000px] w-full bg-white border border-[#e3dcd3] rounded-[40px] shadow-xl overflow-hidden flex flex-col md:flex-row relative z-10">

    <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-between bg-[#9c8372] text-white">
      <div class="space-y-3">
        <h1 class="text-3xl font-black tracking-tighter">
          Fresh<span class="text-[#e0c099]">Cart</span>
        </h1>
        <div class="w-12 h-1 bg-[#e0c099] rounded-full"></div>
      </div>

      <div class="space-y-6 pt-10 md:pt-0">
        <h2 class="text-4xl md:text-5xl font-black leading-tight tracking-tight">
          Welcome <br> Back!
        </h2>
        <p class="text-[#e0d5ce] text-sm max-w-sm leading-relaxed">
          Sign in to access your personalized FreshCart dashboard, exclusive organic deals, and track your grocery orders in real-time.
        </p>
      </div>

      <div class="flex items-center gap-4 pt-10 border-t border-white/20 mt-10">
        <div class="flex -space-x-3 text-white text-xs font-bold">
            <img src="https://api.dicebear.com/8.x/avataaars-neutral/svg?seed=Ali" class="w-9 h-9 rounded-full ring-2 ring-[#9c8372] bg-white/20" alt="U1">
          <img src="https://api.dicebear.com/8.x/avataaars-neutral/svg?seed=Sara" class="w-9 h-9 rounded-full ring-2 ring-[#9c8372] bg-white/20" alt="U2">
          <div class="w-9 h-9 rounded-full ring-2 ring-[#9c8372] bg-[#e0c099] flex items-center justify-center text-[10px] text-[#4a423a]">+50K</div>
        </div>
        <p class="text-[11px] text-[#e0d5ce] font-medium">Join thousands of happy organic lovers.</p>
      </div>
    </div>

    <div class="md:w-1/2 p-8 md:p-16 flex flex-col justify-center bg-white">
      <div class="max-w-md mx-auto w-full">
        <div class="mb-10 text-center md:text-left">
          <p class="text-[11px] text-[#9c8372] font-bold uppercase tracking-[0.2em] mb-1.5">Premium Grocery Access</p>
          <h3 class="text-2xl font-extrabold text-[#2d2824] tracking-tight">Login to Your Account</h3>
        </div>

        <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="submitForm()">
          <div class="relative group">
            <label class="text-[10px] font-bold text-[#8c8278] uppercase tracking-widest ml-1 mb-1.5 block">Email Address</label>
            <div class="relative">
              <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-[#9c8372] transition-colors"></i>
              <input formControlName="email" type="email" placeholder="name@example.com"
                     class="w-full bg-[#f4ede6] border border-[#e3dcd3] focus:border-[#9c8372] focus:ring-1 focus:ring-[#9c8372] rounded-2xl py-4 pl-12 pr-4 text-sm text-[#2d2824] outline-none transition-all placeholder:text-[#b8a99c]">
            </div>
          </div>

          <div class="relative group">
            <label class="text-[10px] font-bold text-[#8c8278] uppercase tracking-widest ml-1 mb-1.5 block">Password</label>
            <div class="relative">
              <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-[#9c8372] transition-colors"></i>
              <input formControlName="password" type="password" placeholder="••••••••"
              class="w-full bg-[#f4ede6] border border-[#e3dcd3] focus:border-[#9c8372] focus:ring-1 focus:ring-[#9c8372] rounded-2xl py-4 pl-12 pr-12 text-sm text-[#2d2824] outline-none transition-all placeholder:text-[#b8a99c]">
              <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-[#9c8372] hover:text-[#4a423a]">
                <i class="fa-regular fa-eye text-sm"></i>
              </button>
            </div>
          </div>

          <button type="submit"
                  class="w-full bg-[#9c8372] text-white py-4 rounded-2xl font-bold text-sm hover:bg-[#826d5d] active:scale-95 transition-all flex items-center justify-center gap-2 mt-4">
            Sign In Now <i class="fa-solid fa-arrow-right text-[11px]"></i>
          </button>
        </form>

        <div class="relative flex items-center justify-center my-9">
          <div class="w-full h-[1px] bg-[#e3dcd3]"></div>
          <span class="absolute bg-white px-4 text-[10px] text-[#8c8278] font-bold tracking-widest uppercase">Or social login</span>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button class="flex items-center justify-center gap-2.5 border border-[#e3dcd3] bg-white py-3.5 rounded-2xl hover:bg-[#fdfbf7] transition-all text-[#2d2824] text-xs font-bold">
              Google
          </button>
          <button class="flex items-center justify-center gap-2.5 border border-[#e3dcd3] bg-white py-3.5 rounded-2xl hover:bg-[#fdfbf7] transition-all text-[#2d2824] text-xs font-bold">
              Facebook
          </button>
        </div>

        <p class="text-center text-sm text-[#8c8278] mt-10">
          Not a member yet? <a href="/register" class="text-[#9c8372] font-black hover:underline">Create an account</a>
        </p>
      </div>
    </div>
  </div>
</div>
