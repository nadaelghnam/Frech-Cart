<div class="p-2 h-full">
  <div
    class="group relative h-full bg-white border border-[#e3dcd3] rounded-2xl p-4 transition-all duration-300 hover:shadow-xl hover:shadow-[#e3dcd3]/50 hover:-translate-y-1">

    <div
      class="absolute top-4 right-4 z-10 flex flex-col gap-2 translate-x-5 opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
      <button (click)="addToWishList(product()._id)"
        class="cursor-pointer w-8 h-8 bg-white border border-[#e3dcd3] rounded-full flex items-center justify-center text-[#8c8278] hover:text-[#9c8372] hover:shadow-md transition-all">
        <i class="fa-regular fa-heart text-sm"></i>
      </button>
      <button [routerLink]="['/details', product()._id]"
        class="cursor-pointer w-8 h-8 bg-white border border-[#e3dcd3] rounded-full flex items-center justify-center text-[#8c8278] hover:text-[#9c8372] hover:shadow-md transition-all">
        <i class="fa-regular fa-eye text-sm"></i>
      </button>
    </div>

    <div
      class="aspect-square w-full mb-4 overflow-hidden rounded-xl bg-[#f4ede6] flex items-center justify-center cursor-pointer"
      [routerLink]="['/details', product().id]">
      <img [src]="product().imageCover" [alt]="product().title"
        class="w-full h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform duration-500">
    </div>

    <div class="space-y-1 cursor-pointer">
      <p class="text-[10px] text-[#8c8278] uppercase tracking-widest font-medium">{{ product().category.name }}</p>
      <h3 class="line-clamp-2 text-sm font-bold text-[#2d2824] group-hover:text-[#9c8372] transition-colors">
        {{ product().title }}
      </h3>

      <div class="flex items-center gap-1 py-1">
        <div class="flex text-amber-400 text-[10px]">

          @for (star of [1, 2, 3, 4, 5]; track $index) {

          @if (product().ratingsAverage >= star) {
          <i class="fa-solid fa-star"></i>
          }
          @else if (product().ratingsAverage > star - 1) {
          <i class="fa-solid fa-star-half-stroke"></i>
          }
          @else {
          <i class="fa-regular fa-star text-gray-300"></i>
          }
          }
        </div>

        <span class="text-[10px] text-[#8c8278] font-medium">
          {{ product().ratingsAverage }} ({{ product().ratingsQuantity }})
        </span>
      </div>

      <div class="flex items-center justify-between pt-2">
        <p class="text-base font-extrabold text-[#2d2824]">{{ product().price }}
          <span class="text-[10px] text-[#8c8278] font-bold">EGP</span>
        </p>
        <button (click)="addToCart(product()._id)"
          class="cursor-pointer w-9 h-9 bg-[#9c8372] text-white rounded-full flex items-center justify-center shadow-lg shadow-[#9c8372]/20 hover:bg-[#826d5d] active:scale-90 transition-all">
          <i class="fa-solid fa-plus text-sm"></i>
        </button>
      </div>
    </div>
  </div>
</div>
